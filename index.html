<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diamond Orbs — Animations</title>
<style>
  :root {
    --bg: #06070b;
    --panel: #0c0e14;
    --line: rgba(255, 230, 190, 0.12);
    --text: #efe6d6;
    --muted: rgba(239, 230, 214, 0.5);
    --accent: rgba(255, 224, 180, 0.9);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
  }
  .app { display: flex; height: 100vh; }

  /* sidebar */
  .sidebar {
    width: 248px; flex: 0 0 248px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 22px 14px;
  }
  .brand {
    font-size: 13px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--muted); padding: 6px 12px 18px;
  }
  .nav { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
  .nav a {
    display: block; text-decoration: none; color: var(--text);
    padding: 11px 14px; border-radius: 10px;
    font-size: 14px; letter-spacing: 0.02em;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav a:hover { background: rgba(255, 230, 190, 0.05); }
  .nav a.active {
    background: rgba(255, 224, 180, 0.10);
    border-color: rgba(255, 224, 180, 0.32);
    color: var(--accent);
  }
  .nav a .sub { display: block; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .foot { margin-top: auto; font-size: 11px; color: var(--muted); padding: 14px 12px 2px; }

  /* stage */
  .stage { flex: 1; position: relative; min-width: 0; }
  iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }
  .empty {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Diamond Orbs</div>
      <nav class="nav" id="nav"></nav>
      <div class="foot">Select an animation type</div>
    </aside>
    <main class="stage">
      <iframe id="frame" title="animation"></iframe>
      <div class="empty" id="empty" hidden></div>
    </main>
  </div>

<script>
// Add a new animation by dropping a file in /animations and adding an entry here.
// { id: url-hash slug, label: sidebar title, sub: optional subtitle, file: path or null if not built yet }
const ANIMATIONS = [
  { id: 'qr-acceptance',     label: 'QR acceptance',            file: null },
  { id: 'capture-not-ok',    label: 'During capture not OK',    file: null },
  { id: 'ok-state',          label: 'OK state',                 file: 'animations/ok-state.html' },
  { id: 'capture-completed', label: 'Capture completed',        file: null },
  { id: 'uploading-pcp',     label: 'Uploading PCP',            file: null },
  { id: 'failure',           label: 'Failure',                  file: null },
];

const nav = document.getElementById('nav');
const frame = document.getElementById('frame');
const empty = document.getElementById('empty');

function render() {
  nav.innerHTML = '';
  ANIMATIONS.forEach(a => {
    const link = document.createElement('a');
    link.href = '#' + a.id;
    link.dataset.id = a.id;
    link.innerHTML = a.label + (a.sub ? `<span class="sub">${a.sub}</span>` : '');
    link.addEventListener('click', (e) => {
      e.preventDefault();
      if (location.hash !== '#' + a.id) location.hash = a.id;
      show(a.id);
    });
    nav.appendChild(link);
  });
  show(location.hash.slice(1) || 'ok-state');
}

function show(id) {
  const a = ANIMATIONS.find(x => x.id === id) || ANIMATIONS[0];
  document.querySelectorAll('.nav a').forEach(el => el.classList.toggle('active', el.dataset.id === a.id));
  if (a.file) {
    frame.src = a.file + '?v=' + Date.now();   // cache-bust the iframe
    frame.style.display = 'block';
    empty.style.display = 'none';
  } else {
    frame.removeAttribute('src');
    frame.style.display = 'none';
    empty.textContent = '"' + a.label + '" — animation not built yet';
    empty.style.display = 'flex';
  }
}

window.addEventListener('hashchange', () => show(location.hash.slice(1)));
render();
</script>
</body>
</html>
