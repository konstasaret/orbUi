<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diamond Orbs — Animations</title>
<style>
  :root {
    --bg: #06070b;
    --panel: #0c0e14;
    --line: rgba(255, 230, 190, 0.12);
    --text: #efe6d6;
    --muted: rgba(239, 230, 214, 0.5);
    --accent: rgba(255, 224, 180, 0.9);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
  }
  .app { display: flex; height: 100vh; }

  /* sidebar */
  .sidebar {
    width: 248px; flex: 0 0 248px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 22px 14px;
  }
  .brand {
    font-size: 13px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--muted); padding: 6px 12px 18px;
  }
  .nav { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
  .nav a {
    display: block; text-decoration: none; color: var(--text);
    padding: 11px 14px; border-radius: 10px;
    font-size: 14px; letter-spacing: 0.02em;
    border: 1px solid transparent; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav a:hover { background: rgba(255, 230, 190, 0.05); }
  .nav a.active {
    background: rgba(255, 224, 180, 0.10);
    border-color: rgba(255, 224, 180, 0.32);
    color: var(--accent);
  }
  .nav a .sub { display: block; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .foot { margin-top: auto; font-size: 11px; color: var(--muted); padding: 14px 12px 2px; }

  /* stage */
  .stage {
    flex: 1; position: relative; min-width: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 42%, #0c0d12 0%, var(--bg) 72%);
  }
  .canvasWrap { position: relative; }
  canvas { display: block; }
  .hud {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .pct {
    font-size: 36px; font-weight: 500; letter-spacing: 0.04em;
    color: rgba(255, 244, 224, 0.92);
    text-shadow: 0 0 26px rgba(255, 224, 180, 0.45);
  }
  .label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.34em; opacity: 0.5; margin-top: 7px;
  }
  .controls { margin-top: 36px; display: flex; gap: 12px; }
  button {
    background: rgba(255, 230, 190, 0.06);
    border: 1px solid rgba(255, 230, 190, 0.28);
    color: var(--text); padding: 9px 18px; border-radius: 999px;
    font-size: 13px; letter-spacing: 0.06em; cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: rgba(255, 230, 190, 0.16); }
  .empty { color: var(--muted); font-size: 14px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Diamond Orbs</div>
      <nav class="nav" id="nav"></nav>
      <div class="foot">Select an animation type</div>
    </aside>
    <main class="stage">
      <div class="canvasWrap" id="canvasWrap">
        <canvas id="c" width="520" height="520"></canvas>
        <div class="hud">
          <div class="pct" id="pct">0%</div>
          <div class="label" id="label">Stacking</div>
        </div>
      </div>
      <div class="controls" id="controls">
        <button id="replay">Replay</button>
        <button id="speed">Speed: 1×</button>
      </div>
      <div class="empty" id="empty" style="display:none"></div>
    </main>
  </div>

<script>
// ---------- shared canvas ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;
const SIZE = 520;
canvas.width = SIZE * DPR; canvas.height = SIZE * DPR;
canvas.style.width = SIZE + 'px'; canvas.style.height = SIZE + 'px';
ctx.scale(DPR, DPR);

const ui = {
  pct: document.getElementById('pct'),
  label: document.getElementById('label'),
  replay: document.getElementById('replay'),
  speed: document.getElementById('speed'),
};

// =================================================================
// Animation: OK state — Tetris ring (warm white fill + green success)
// =================================================================
function startOkState() {
  let rafId = null, running = true;
  const cx = SIZE / 2, cy = SIZE / 2;
  const R_OUTER = 158, R_INNER = 128;
  const HALF = 9, SECTIONS = HALF * 2;
  const STEP = Math.PI / HALF, GAP = STEP * 0.18;
  const BOTTOM = Math.PI / 2;
  const angleR = (i) => BOTTOM - i * STEP;
  const angleL = (i) => BOTTOM + i * STEP;

  const stepDur = 60, lockPause = 110, gap = 50;
  const order = [];
  for (let j = HALF; j >= 0; j--) order.push({ target: j });
  const TARGET_ELAPSED = 7000 * 2;   // 7s at 2x

  let moves = [], locks = [], totalT = 0;
  (function build() {
    let t = 0;
    for (const b of order) {
      for (let s = 0; s <= b.target; s++) { moves.push({ idx: s, t0: t, t1: t + stepDur }); t += stepDur; }
      locks.push({ idx: b.target, tLock: t }); t += lockPause + gap;
    }
    const f = TARGET_ELAPSED / t;
    for (const m of moves) { m.t0 *= f; m.t1 *= f; }
    for (const l of locks) l.tLock *= f;
    totalT = TARGET_ELAPSED;
  })();

  let speed = 1, startTime = null, successStart = null;
  const WARM = [255, 238, 210], GREEN = [70, 226, 138];
  const rgba = (c, a) => `rgba(${c[0] | 0}, ${c[1] | 0}, ${c[2] | 0}, ${a})`;
  const lerp = (a, b, t) => a + (b - a) * t;
  const mix = (c1, c2, t) => [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)];

  function drawRing(radius, lw, alpha, color = WARM) {
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.lineWidth = lw; ctx.strokeStyle = rgba(color, alpha); ctx.stroke();
  }
  const W_TOP = 13, W_BOTTOM = 32.5;
  const thicknessAt = (ang) => W_TOP + (W_BOTTOM - W_TOP) * ((Math.sin(ang) + 1) / 2);
  function drawSection(angCenter, intensity, color = WARM, glowScale = 1) {
    const a0 = angCenter - STEP / 2 + GAP / 2, a1 = angCenter + STEP / 2 - GAP / 2;
    ctx.beginPath(); ctx.arc(cx, cy, R_INNER, a0, a1);
    ctx.lineCap = 'round'; ctx.lineWidth = thicknessAt(angCenter);
    ctx.shadowColor = rgba(color, 0.85 * Math.min(1, intensity));
    ctx.shadowBlur = 18 * intensity * glowScale;
    ctx.strokeStyle = rgba(color, 0.10 + 0.9 * Math.min(1, intensity));
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  const COLOR_MS = 420, BLOOM_MS = 700;

  function frame(t) {
    if (!running) return;
    if (startTime === null) startTime = t;
    const elapsed = (t - startTime) * speed;
    ctx.clearRect(0, 0, SIZE, SIZE);
    drawRing(R_OUTER, 1.5, 0.22);
    for (let j = 0; j <= HALF; j++) { drawSection(angleR(j), 0); drawSection(angleL(j), 0); }

    let lockedSections = 0;
    for (const lk of locks) {
      if (lk.tLock <= elapsed) {
        drawSection(angleR(lk.idx), 1); drawSection(angleL(lk.idx), 1);
        lockedSections += (lk.idx === 0 || lk.idx === HALF) ? 1 : 2;
      }
    }
    for (const mv of moves) {
      if (elapsed >= mv.t0 && elapsed < mv.t1) {
        drawSection(angleR(mv.idx), 1); drawSection(angleL(mv.idx), 1); break;
      }
    }
    ui.pct.textContent = Math.round((lockedSections / SECTIONS) * 100) + '%';
    rafId = requestAnimationFrame(elapsed < totalT ? frame : frameDone);
  }

  function frameDone(t) {
    if (!running) return;
    if (successStart === null) successStart = t;
    const e = t - successStart;
    ctx.clearRect(0, 0, SIZE, SIZE);
    const k = Math.min(1, e / COLOR_MS);
    const col = mix(WARM, GREEN, k);
    let intensity, glow;
    if (e < BLOOM_MS) { const b = Math.sin((e / BLOOM_MS) * Math.PI); intensity = 1 + 0.9 * b; glow = 1 + 3.2 * b; }
    else { const br = 0.5 + 0.5 * Math.sin((e - BLOOM_MS) / 520); intensity = 0.85 + 0.15 * br; glow = 1.5 + 0.4 * br; }
    drawRing(R_OUTER, 1.5, 0.22 + 0.25 * k, col);
    for (let j = 0; j <= HALF; j++) { drawSection(angleR(j), intensity, col, glow); drawSection(angleL(j), intensity, col, glow); }
    ui.pct.textContent = '100%';
    ui.pct.style.color = rgba(col, 0.95);
    ui.pct.style.textShadow = `0 0 26px ${rgba(col, 0.5)}`;
    rafId = requestAnimationFrame(frameDone);
  }

  function restart() {
    startTime = null; successStart = null;
    ui.pct.style.color = ''; ui.pct.style.textShadow = '';
    rafId = requestAnimationFrame(frame);
  }

  ui.label.textContent = 'Stacking';
  ui.replay.onclick = restart;
  ui.speed.onclick = () => {
    speed = speed === 1 ? 1.5 : speed === 1.5 ? 2 : speed === 2 ? 0.5 : 1;
    ui.speed.textContent = 'Speed: ' + speed + '×';
  };
  restart();

  return { stop() { running = false; if (rafId) cancelAnimationFrame(rafId); ui.replay.onclick = null; ui.speed.onclick = null; } };
}

// =================================================================
// Animation: QR acceptance — rest (closed outer ring + yellow inner),
// then ONE blink (inner white, outer soft green) on acceptance
// =================================================================
function startQrAcceptance() {
  let rafId = null, running = true, speed = 1;
  const cx = SIZE / 2, cy = SIZE / 2;
  const R_OUTER = 168, R_INNER = 128;
  const HALF = 9, STEP = Math.PI / HALF, GAP = STEP * 0.18, BOTTOM = Math.PI / 2;
  const WHITE = [255, 238, 210], YELLOW = [255, 196, 84], SOFT_GREEN = [140, 210, 160];
  const rgba = (c, a) => `rgba(${c[0] | 0}, ${c[1] | 0}, ${c[2] | 0}, ${a})`;
  const lerp = (a, b, t) => a + (b - a) * t;
  const mix = (c1, c2, t) => [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)];

  // inner ring section centre angles (same geometry as OK state)
  const angles = [];
  for (let i = 0; i <= HALF; i++) angles.push(BOTTOM - i * STEP);
  for (let i = 1; i < HALF; i++) angles.push(BOTTOM + i * STEP);

  const W_TOP = 13, W_BOTTOM = 32.5;
  const thicknessAt = (ang) => W_TOP + (W_BOTTOM - W_TOP) * ((Math.sin(ang) + 1) / 2);

  function drawSection(ang, intensity, color, glowScale) {
    const a0 = ang - STEP / 2 + GAP / 2, a1 = ang + STEP / 2 - GAP / 2;
    ctx.beginPath(); ctx.arc(cx, cy, R_INNER, a0, a1);
    ctx.lineCap = 'round'; ctx.lineWidth = thicknessAt(ang);
    ctx.shadowColor = rgba(color, 0.85 * Math.min(1, intensity));
    ctx.shadowBlur = 18 * intensity * glowScale;
    ctx.strokeStyle = rgba(color, 0.10 + 0.9 * Math.min(1, intensity));
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // closed (gapless) outer ring, half the inner width
  function drawClosedOuter(intensity, color, glowScale) {
    const segs = 160; ctx.lineCap = 'butt';
    for (let i = 0; i < segs; i++) {
      const a0 = (i / segs) * Math.PI * 2, a1 = ((i + 1) / segs) * Math.PI * 2, mid = (a0 + a1) / 2;
      ctx.beginPath(); ctx.arc(cx, cy, R_OUTER, a0 - 0.012, a1 + 0.012);
      ctx.lineWidth = thicknessAt(mid) * 0.5;
      ctx.shadowColor = rgba(color, 0.7 * Math.min(1, intensity));
      ctx.shadowBlur = 14 * intensity * glowScale;
      ctx.strokeStyle = rgba(color, 0.08 + 0.92 * Math.min(1, intensity));
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  // a continuous white progress arc filling the outer ring clockwise from the top
  function drawProgress(frac) {
    if (frac <= 0) return;
    const total = frac * Math.PI * 2;
    const start = -Math.PI / 2;                 // top of the canvas
    const segs = Math.max(2, Math.ceil(frac * 80));
    ctx.lineCap = 'round';
    for (let i = 0; i < segs; i++) {
      const a0 = start + (i / segs) * total;
      const a1 = start + ((i + 1) / segs) * total;
      const mid = (a0 + a1) / 2;
      ctx.beginPath(); ctx.arc(cx, cy, R_OUTER, a0, a1);
      ctx.lineWidth = thicknessAt(mid) * 0.5;   // matches the closed outer width
      ctx.shadowColor = rgba(WHITE, 0.9);
      ctx.shadowBlur = 22;
      ctx.strokeStyle = rgba(WHITE, 1);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  // timeline (ms, scaled): rest -> blink -> lights off -> reopen white -> stalled progress
  const REST1 = 1400, BLINK_DUR = 750, OFF_DUR = 420, REOPEN_DUR = 450, PROG_DUR = 700;
  const T_BLINK = REST1 + BLINK_DUR;
  const T_OFF = T_BLINK + OFF_DUR;
  const T_REOPEN = T_OFF + REOPEN_DUR;
  const STALL = 0.10;                            // progress freezes at 10%
  let startTime = null;

  function frame(t) {
    if (!running) return;
    if (startTime === null) startTime = t;
    const e = (t - startTime) * speed;
    ctx.clearRect(0, 0, SIZE, SIZE);

    let innerColor = YELLOW, innerI = 0.55, outerI = 0.9, progFrac = 0;
    let label = 'Ready', pct = '';

    if (e < REST1) {
      // resting: yellow inner, closed dim-green outer
    } else if (e < T_BLINK) {
      // one blink: single sine hump
      const pulse = Math.sin((e - REST1) / BLINK_DUR * Math.PI);
      innerColor = mix(YELLOW, WHITE, pulse);
      innerI = 0.55 + 0.45 * pulse;
      outerI = 0.9 + 0.1 * pulse;
      label = 'Accepted';
    } else if (e < T_OFF) {
      // lights close: fade everything off
      const k = (e - T_BLINK) / OFF_DUR;
      innerColor = WHITE; innerI = lerp(0.55, 0, k); outerI = lerp(0.9, 0, k);
      label = 'Accepted';
    } else if (e < T_REOPEN) {
      // reopen: inner white + closed outer fade back in
      const k = (e - T_OFF) / REOPEN_DUR;
      innerColor = WHITE; innerI = lerp(0, 1.0, k); outerI = lerp(0, 0.82, k);
      label = 'Processing';
    } else {
      // inner full white, outer closed (still clearly lit); progress sweeps the outer ring and stalls at 10%
      innerColor = WHITE; innerI = 1.0; outerI = 0.82;
      const pe = e - T_REOPEN;
      progFrac = Math.min(STALL, STALL * (pe / PROG_DUR));
      label = 'Processing';
      pct = Math.round(progFrac * 100) + '%';
    }

    drawClosedOuter(outerI, e < T_OFF ? SOFT_GREEN : WHITE, 1.1);
    for (const a of angles) drawSection(a, innerI, innerColor, 1.0);
    drawProgress(progFrac);

    ui.label.textContent = label;
    ui.pct.textContent = pct;
    rafId = requestAnimationFrame(frame);
  }

  function restart() { startTime = null; ui.pct.style.color = ''; ui.pct.style.textShadow = ''; rafId = requestAnimationFrame(frame); }
  ui.replay.onclick = restart;
  ui.speed.onclick = () => { speed = speed === 1 ? 1.5 : speed === 1.5 ? 2 : speed === 2 ? 0.5 : 1; ui.speed.textContent = 'Speed: ' + speed + '×'; };
  restart();

  return { stop() { running = false; if (rafId) cancelAnimationFrame(rafId); ui.replay.onclick = null; ui.speed.onclick = null; } };
}

function startCaptureNotOk() {
  let rafId = null, running = true, speed = 1;
  const cx = SIZE / 2, cy = SIZE / 2;
  const R_OUTER = 168, R_INNER = 128;
  const HALF = 9, STEP = Math.PI / HALF, GAP = STEP * 0.18, BOTTOM = Math.PI / 2;
  const WHITE = [255, 238, 210];
  const rgba = (c, a) => `rgba(${c[0] | 0}, ${c[1] | 0}, ${c[2] | 0}, ${a})`;
  const lerp = (a, b, t) => a + (b - a) * t;
  const smooth = (t) => t * t * (3 - 2 * t);

  const angles = [];
  for (let i = 0; i <= HALF; i++) angles.push(BOTTOM - i * STEP);
  for (let i = 1; i < HALF; i++) angles.push(BOTTOM + i * STEP);

  const W_TOP = 13, W_BOTTOM = 32.5;
  const thicknessAt = (ang) => W_TOP + (W_BOTTOM - W_TOP) * ((Math.sin(ang) + 1) / 2);

  function drawSection(ang, intensity, color, glowScale) {
    const a0 = ang - STEP / 2 + GAP / 2, a1 = ang + STEP / 2 - GAP / 2;
    ctx.beginPath(); ctx.arc(cx, cy, R_INNER, a0, a1);
    ctx.lineCap = 'round'; ctx.lineWidth = thicknessAt(ang);
    ctx.shadowColor = rgba(color, 0.85 * Math.min(1, intensity));
    ctx.shadowBlur = 18 * intensity * glowScale;
    ctx.strokeStyle = rgba(color, 0.10 + 0.9 * Math.min(1, intensity));
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  function drawClosedOuter(intensity, color, glowScale) {
    const segs = 160; ctx.lineCap = 'butt';
    for (let i = 0; i < segs; i++) {
      const a0 = (i / segs) * Math.PI * 2, a1 = ((i + 1) / segs) * Math.PI * 2, mid = (a0 + a1) / 2;
      ctx.beginPath(); ctx.arc(cx, cy, R_OUTER, a0 - 0.012, a1 + 0.012);
      ctx.lineWidth = thicknessAt(mid) * 0.5;
      ctx.shadowColor = rgba(color, 0.7 * Math.min(1, intensity));
      ctx.shadowBlur = 14 * intensity * glowScale;
      ctx.strokeStyle = rgba(color, 0.08 + 0.92 * Math.min(1, intensity));
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  function drawProgress(frac) {
    if (frac <= 0) return;
    const total = frac * Math.PI * 2;
    const start = -Math.PI / 2;
    const segs = Math.max(2, Math.ceil(frac * 80));
    ctx.lineCap = 'round';
    for (let i = 0; i < segs; i++) {
      const a0 = start + (i / segs) * total;
      const a1 = start + ((i + 1) / segs) * total;
      const mid = (a0 + a1) / 2;
      ctx.beginPath(); ctx.arc(cx, cy, R_OUTER, a0, a1);
      ctx.lineWidth = thicknessAt(mid) * 0.5;
      ctx.shadowColor = rgba(WHITE, 0.9);
      ctx.shadowBlur = 22;
      ctx.strokeStyle = rgba(WHITE, 1);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  // breathing periods (ms): calm normal vs. faster "wrong position"
  const NORMAL_PERIOD = 3000, FAST_PERIOD = 1150;
  // wrong-position window (scaled ms), with smooth ramps in/out
  const WRONG_IN = 3200, WRONG_HOLD = 3800, RAMP = 900;
  const WRONG_OUT = WRONG_IN + WRONG_HOLD;
  // outer progress creeps slowly to 60%
  const PROG_TOTAL = 13000, PROG_TARGET = 0.60;

  function wrongness(e) {
    if (e < WRONG_IN) return 0;
    if (e < WRONG_IN + RAMP) return smooth((e - WRONG_IN) / RAMP);
    if (e < WRONG_OUT) return 1;
    if (e < WRONG_OUT + RAMP) return 1 - smooth((e - WRONG_OUT) / RAMP);
    return 0;
  }

  let startTime = null, lastT = null, phase = 0;

  function frame(t) {
    if (!running) return;
    if (startTime === null) { startTime = t; lastT = t; }
    const e = (t - startTime) * speed;
    const dt = (t - lastT) * speed; lastT = t;
    ctx.clearRect(0, 0, SIZE, SIZE);

    const w = wrongness(e);                              // 0 calm, 1 wrong position
    const period = lerp(NORMAL_PERIOD, FAST_PERIOD, w);
    phase += dt * (2 * Math.PI / period);
    const breathe = 0.5 + 0.5 * Math.sin(phase);         // 0..1

    // calm breath swings gently; wrong position breathes harder + brighter
    const lo = lerp(0.42, 0.5, w), hi = lerp(0.85, 1.0, w);
    const innerI = lo + (hi - lo) * breathe;

    const prog = Math.min(PROG_TARGET, PROG_TARGET * (e / PROG_TOTAL));

    drawClosedOuter(0.82, WHITE, 1.1);
    for (const a of angles) drawSection(a, innerI, WHITE, 1.0);
    drawProgress(prog);

    ui.label.textContent = w > 0.5 ? 'Adjust position' : 'Capturing';
    ui.pct.textContent = Math.round(prog * 100) + '%';
    rafId = requestAnimationFrame(frame);
  }

  function restart() { startTime = null; lastT = null; phase = 0; ui.pct.style.color = ''; ui.pct.style.textShadow = ''; rafId = requestAnimationFrame(frame); }
  ui.replay.onclick = restart;
  ui.speed.onclick = () => { speed = speed === 1 ? 1.5 : speed === 1.5 ? 2 : speed === 2 ? 0.5 : 1; ui.speed.textContent = 'Speed: ' + speed + '×'; };
  restart();

  return { stop() { running = false; if (rafId) cancelAnimationFrame(rafId); ui.replay.onclick = null; ui.speed.onclick = null; } };
}

function startCaptureCompleted() {
  let rafId = null, running = true, speed = 1;
  const cx = SIZE / 2, cy = SIZE / 2;
  const R_OUTER = 168, R_INNER = 128;
  const HALF = 9, STEP = Math.PI / HALF, GAP = STEP * 0.18, BOTTOM = Math.PI / 2;
  const WHITE = [255, 238, 210], SOFT_GREEN = [140, 210, 160];
  const rgba = (c, a) => `rgba(${c[0] | 0}, ${c[1] | 0}, ${c[2] | 0}, ${a})`;
  const lerp = (a, b, t) => a + (b - a) * t;
  const mix = (c1, c2, t) => [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)];

  const angles = [];
  for (let i = 0; i <= HALF; i++) angles.push(BOTTOM - i * STEP);
  for (let i = 1; i < HALF; i++) angles.push(BOTTOM + i * STEP);

  const W_TOP = 13, W_BOTTOM = 32.5;
  const thicknessAt = (ang) => W_TOP + (W_BOTTOM - W_TOP) * ((Math.sin(ang) + 1) / 2);

  function drawSection(ang, intensity, color, glowScale) {
    const a0 = ang - STEP / 2 + GAP / 2, a1 = ang + STEP / 2 - GAP / 2;
    ctx.beginPath(); ctx.arc(cx, cy, R_INNER, a0, a1);
    ctx.lineCap = 'round'; ctx.lineWidth = thicknessAt(ang);
    ctx.shadowColor = rgba(color, 0.85 * Math.min(1, intensity));
    ctx.shadowBlur = 18 * intensity * glowScale;
    ctx.strokeStyle = rgba(color, 0.10 + 0.9 * Math.min(1, intensity));
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  function drawClosedOuter(intensity, color, glowScale) {
    const segs = 160; ctx.lineCap = 'butt';
    for (let i = 0; i < segs; i++) {
      const a0 = (i / segs) * Math.PI * 2, a1 = ((i + 1) / segs) * Math.PI * 2, mid = (a0 + a1) / 2;
      ctx.beginPath(); ctx.arc(cx, cy, R_OUTER, a0 - 0.012, a1 + 0.012);
      ctx.lineWidth = thicknessAt(mid) * 0.5;
      ctx.shadowColor = rgba(color, 0.7 * Math.min(1, intensity));
      ctx.shadowBlur = 14 * intensity * glowScale;
      ctx.strokeStyle = rgba(color, 0.08 + 0.92 * Math.min(1, intensity));
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  function drawProgress(frac, color) {
    if (frac <= 0) return;
    const total = frac * Math.PI * 2;
    const start = -Math.PI / 2;
    const segs = Math.max(2, Math.ceil(frac * 80));
    ctx.lineCap = 'round';
    for (let i = 0; i < segs; i++) {
      const a0 = start + (i / segs) * total;
      const a1 = start + ((i + 1) / segs) * total;
      const mid = (a0 + a1) / 2;
      ctx.beginPath(); ctx.arc(cx, cy, R_OUTER, a0, a1);
      ctx.lineWidth = thicknessAt(mid) * 0.5;
      ctx.shadowColor = rgba(color, 0.9);
      ctx.shadowBlur = 22;
      ctx.strokeStyle = rgba(color, 1);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  // timeline (ms, scaled): fill to 100% -> hold -> 2 green blinks -> close
  const PROG_DUR = 1700, HOLD = 260, BLINK = 430, GAP_MS = 200, CLOSE = 560;
  const T_PROG = PROG_DUR;
  const T_HOLD = T_PROG + HOLD;
  const T_B1 = T_HOLD + BLINK;
  const T_G = T_B1 + GAP_MS;
  const T_B2 = T_G + BLINK;
  const T_CLOSE = T_B2 + CLOSE;
  let startTime = null;

  function frame(t) {
    if (!running) return;
    if (startTime === null) startTime = t;
    const e = (t - startTime) * speed;
    ctx.clearRect(0, 0, SIZE, SIZE);

    if (e < T_HOLD) {
      // progress fills the outer ring to 100%; inner ring full white
      const prog = Math.min(1, e / PROG_DUR);
      drawClosedOuter(0.82, WHITE, 1.1);
      for (const a of angles) drawSection(a, 1.0, WHITE, 1.0);
      drawProgress(prog, WHITE);
      ui.label.textContent = 'Capturing';
      ui.pct.textContent = Math.round(prog * 100) + '%';
    } else {
      // two soft-green success blinks on both rings, then close
      const te = e - T_HOLD;
      let blink = 0;
      if (te < BLINK) blink = Math.sin(te / BLINK * Math.PI);
      else if (te < BLINK + GAP_MS) blink = 0;
      else if (te < 2 * BLINK + GAP_MS) blink = Math.sin((te - BLINK - GAP_MS) / BLINK * Math.PI);

      let fade = 1;
      if (e >= T_B2) fade = Math.max(0, 1 - (e - T_B2) / CLOSE);   // close down

      const base = 0.22;
      const intensity = (base + (1 - base) * blink) * fade;
      const glow = 1 + 2.6 * blink;

      drawClosedOuter(Math.min(1, intensity), SOFT_GREEN, glow);
      for (const a of angles) drawSection(a, intensity, SOFT_GREEN, glow);

      ui.label.textContent = e < T_CLOSE ? 'Captured' : '';
      ui.pct.textContent = '';
    }
    rafId = requestAnimationFrame(frame);
  }

  function restart() { startTime = null; ui.pct.style.color = ''; ui.pct.style.textShadow = ''; rafId = requestAnimationFrame(frame); }
  ui.replay.onclick = restart;
  ui.speed.onclick = () => { speed = speed === 1 ? 1.5 : speed === 1.5 ? 2 : speed === 2 ? 0.5 : 1; ui.speed.textContent = 'Speed: ' + speed + '×'; };
  restart();

  return { stop() { running = false; if (rafId) cancelAnimationFrame(rafId); ui.replay.onclick = null; ui.speed.onclick = null; } };
}

// ---------- registry ----------
// start: factory returning { stop } — or null for "not built yet"
const ANIMATIONS = [
  { id: 'qr-acceptance',     label: 'QR acceptance',         start: startQrAcceptance },
  { id: 'capture-not-ok',    label: 'During capture not OK', start: startCaptureNotOk },
  { id: 'ok-state',          label: 'OK state',              start: startOkState },
  { id: 'capture-completed', label: 'Capture completed',     start: startCaptureCompleted },
  { id: 'uploading-pcp',     label: 'Uploading PCP',         start: null },
  { id: 'failure',           label: 'Failure',               start: null },
];

const nav = document.getElementById('nav');
const canvasWrap = document.getElementById('canvasWrap');
const controls = document.getElementById('controls');
const empty = document.getElementById('empty');
let current = null;

function render() {
  nav.innerHTML = '';
  ANIMATIONS.forEach(a => {
    const link = document.createElement('a');
    link.href = '#' + a.id;
    link.dataset.id = a.id;
    link.innerHTML = a.label + (a.sub ? `<span class="sub">${a.sub}</span>` : '');
    link.addEventListener('click', (e) => { e.preventDefault(); if (location.hash !== '#' + a.id) location.hash = a.id; show(a.id); });
    nav.appendChild(link);
  });
  show(location.hash.slice(1) || 'ok-state');
}

function show(id) {
  const a = ANIMATIONS.find(x => x.id === id) || ANIMATIONS[0];
  document.querySelectorAll('.nav a').forEach(el => el.classList.toggle('active', el.dataset.id === a.id));
  if (current) { current.stop(); current = null; }
  ctx.clearRect(0, 0, SIZE, SIZE);
  ui.speed.textContent = 'Speed: 1×';
  ui.pct.style.color = ''; ui.pct.style.textShadow = '';
  if (a.start) {
    canvasWrap.style.display = ''; controls.style.display = ''; empty.style.display = 'none';
    current = a.start();
  } else {
    canvasWrap.style.display = 'none'; controls.style.display = 'none';
    empty.textContent = '"' + a.label + '" — animation not built yet';
    empty.style.display = '';
  }
}

window.addEventListener('hashchange', () => show(location.hash.slice(1)));
render();
</script>
